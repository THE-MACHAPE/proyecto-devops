name: CI/CD Pipeline to Docker Hub

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  continuous-integration:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar codigo del repositorio
      uses: actions/checkout@v4

    - name: Configurar entorno de Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Instalar dependencias
      run: npm ci

    - name: Ejecutar batería de Pruebas Unitarias
      run: npm test

    - name: Configurar Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Autenticacion en Docker Hub
      uses: docker/login-action@v4
      with:
        username: themachape
        password: ${{ secrets.DOCKER_HUB_TOKEN }}

    # =======================================================
    # NUEVA COMPROBACIÓN EXIGIDA POR EL PROFESOR (BUILD CHECK)
    # =======================================================
    - name: Validate build configuration
      uses: docker/build-push-action@v7
      with:
        context: .
        call: check

    # =======================================================
    # COMPILACIÓN Y EMPUJE DEFINITIVO A DOCKER HUB
    # =======================================================
    - name: Compilar imagen y empujar a Docker Hub
      uses: docker/build-push-action@v7
      with:
        context: .
        push: true
        tags: |
          themachape/node-api:latest
          themachape/node-api:${{ github.sha }}
